<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="PokéBrocante" />
<meta name="theme-color" content="#0a0a0c" />
<meta name="color-scheme" content="dark" />
<title>PokéBrocante</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
  :root {
    color-scheme: dark only;

    /* Base palette - dark sophisticated */
    --bg: #0a0a0c;
    --bg-1: #131418;
    --bg-2: #1c1d22;
    --bg-3: #25262c;
    --border: #2e2f36;
    --border-strong: #3d3e47;

    /* Text */
    --text: #f5f5f7;
    --text-2: #a8a9b3;
    --text-3: #6e6f7a;

    /* Accents Pokémon - subtils */
    --red: #ee1515;
    --red-glow: rgba(238, 21, 21, 0.4);
    --yellow: #ffcb05;
    --yellow-glow: rgba(255, 203, 5, 0.3);
    --green: #4ade80;
    --green-bg: rgba(74, 222, 128, 0.12);
    --red-bg: rgba(238, 21, 21, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overscroll-behavior: none;
    color-scheme: dark only;
    background-color: var(--bg);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    color: var(--text);
    background-color: var(--bg);
    background-image:
      radial-gradient(at 0% 0%, rgba(238, 21, 21, 0.08) 0%, transparent 40%),
      radial-gradient(at 100% 100%, rgba(255, 203, 5, 0.05) 0%, transparent 40%);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 100px;
    padding-top: env(safe-area-inset-top);
    letter-spacing: -0.01em;
  }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }

  /* ---------- HEADER ---------- */
  header {
    padding: 18px 20px;
    background: rgba(10, 10, 12, 0.85);
    backdrop-filter: saturate(160%) blur(20px);
    -webkit-backdrop-filter: saturate(160%) blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-mark {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(180deg, var(--red) 0% 50%, #fff 50% 100%);
    position: relative;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--border-strong),
                0 4px 16px var(--red-glow);
    flex-shrink: 0;
  }
  .logo-mark::before {
    content: '';
    position: absolute;
    left: 0; right: 0; top: 50%;
    height: 2px;
    background: var(--bg);
    transform: translateY(-1px);
  }
  .logo-mark::after {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    width: 10px; height: 10px;
    background: #fff;
    border: 2px solid var(--bg);
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  .brand-text { display: flex; flex-direction: column; line-height: 1.1; }
  .brand h1 {
    font-weight: 700;
    font-size: 19px;
    letter-spacing: -0.02em;
  }
  .tagline {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 2px;
    letter-spacing: 0;
  }

  /* ---------- VIEWS ---------- */
  .view { display: none; padding: 24px 16px; max-width: 720px; margin: 0 auto; }
  .view.active { display: block; animation: fadeUp 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
    margin-bottom: 14px;
    letter-spacing: 0.02em;
  }

  /* ---------- BUTTONS ---------- */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px 18px;
    background: var(--bg-2);
    color: var(--text);
    font-weight: 600;
    font-size: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    transition: transform 0.12s ease, background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); }
  .btn-cardinal {
    background: var(--red);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 4px 14px var(--red-glow);
  }
  .btn-cardinal:active { background: #d11212; }
  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border-strong);
  }
  .btn-ghost:active { background: var(--bg-2); }
  .btn-sm { padding: 9px 13px; font-size: 13px; }
  .btn-block { width: 100%; }

  /* ---------- INPUTS ---------- */
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-2);
    margin-bottom: 7px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 13px 14px;
    background: var(--bg-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 16px;
    transition: border-color 0.15s, background 0.15s;
    -webkit-text-fill-color: var(--text);
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    background: var(--bg-3);
    border-color: var(--red);
  }
  .field input::placeholder, .field textarea::placeholder {
    color: var(--text-3);
    opacity: 1;
  }

  /* ---------- CARDS / LIST ITEMS ---------- */
  .card-item {
    background: var(--bg-1);
    border: 1px solid var(--border);
    padding: 14px 14px;
    margin-bottom: 8px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s, transform 0.1s;
  }
  .card-item:active { transform: scale(0.99); }
  .card-item.sold { opacity: 0.45; }
  .card-item.sold .card-name { text-decoration: line-through; }
  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-weight: 600;
    font-size: 16px;
    line-height: 1.25;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }
  .card-meta {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-price {
    font-weight: 700;
    font-size: 16px;
    color: var(--yellow);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .card-actions { display: flex; gap: 6px; margin-left: 4px; }
  .icon-btn {
    width: 36px; height: 36px;
    display: grid; place-items: center;
    border: 1px solid var(--border);
    background: var(--bg-2);
    border-radius: 10px;
    font-size: 15px;
    color: var(--text-2);
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .icon-btn:active { background: var(--red); color: #fff; border-color: var(--red); }

  /* ---------- BOTTOM NAV ---------- */
  nav.bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(19, 20, 24, 0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
    z-index: 100;
    gap: 4px;
  }
  nav.bottom button {
    padding: 9px 4px 7px;
    color: var(--text-3);
    font-size: 10px;
    font-weight: 500;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border-radius: 10px;
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  nav.bottom button .ico { font-size: 20px; line-height: 1; }
  nav.bottom button.active { color: var(--text); background: var(--bg-2); }
  nav.bottom button.active .ico { color: var(--red); }

  /* ---------- EMPTY STATE ---------- */
  .empty {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-3);
  }
  .empty .big {
    font-size: 44px;
    margin-bottom: 14px;
    opacity: 0.5;
  }
  .empty .msg {
    font-size: 15px;
    line-height: 1.5;
  }

  /* ---------- MODAL ---------- */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-bg.open { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--bg-1);
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 22px 20px calc(28px + env(safe-area-inset-bottom));
    border-radius: 24px 24px 0 0;
    border-top: 1px solid var(--border-strong);
    animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    position: relative;
  }
  .modal::before {
    content: '';
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    width: 40px; height: 4px;
    background: var(--border-strong);
    border-radius: 2px;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal h2 {
    font-size: 22px;
    font-weight: 700;
    margin-top: 12px;
    margin-bottom: 2px;
    letter-spacing: -0.02em;
  }
  .modal .modal-sub {
    font-size: 13px;
    color: var(--text-3);
    margin-bottom: 18px;
  }

  /* ---------- SCAN VIEW ---------- */
  #scan-region {
    width: 100%;
    max-width: 380px;
    margin: 0 auto;
    border: 1px solid var(--border-strong);
    background: #000;
    aspect-ratio: 1;
    overflow: hidden;
    position: relative;
    border-radius: 24px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }
  #scan-region::after {
    content: '';
    position: absolute;
    inset: 12%;
    border: 2px solid rgba(255, 203, 5, 0.7);
    border-radius: 16px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.35);
    pointer-events: none;
    animation: scanPulse 2s ease-in-out infinite;
  }
  @keyframes scanPulse {
    0%, 100% { border-color: rgba(255, 203, 5, 0.7); }
    50% { border-color: rgba(255, 203, 5, 0.3); }
  }
  #scan-region video, #scan-region img { width: 100% !important; height: 100% !important; object-fit: cover; }
  .scan-status {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: var(--text-3);
  }
  .scan-feedback {
    margin-top: 16px;
    padding: 18px 16px;
    border: 1px solid;
    text-align: center;
    border-radius: 14px;
    animation: feedbackIn 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .scan-feedback.ok { border-color: var(--green); background: var(--green-bg); }
  .scan-feedback.err { border-color: var(--red); background: var(--red-bg); }
  .scan-feedback strong {
    font-size: 18px;
    display: block;
    margin-bottom: 4px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .scan-feedback span { font-size: 13px; color: var(--text-2); }
  @keyframes feedbackIn {
    0% { transform: scale(0.95) translateY(4px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* ---------- SESSION SUMMARY ---------- */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 18px;
  }
  .stat {
    background: var(--bg-1);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 18px 16px;
    text-align: left;
    border-radius: 16px;
    position: relative;
    overflow: hidden;
  }
  .stat.cardinal {
    background: linear-gradient(135deg, var(--red) 0%, #b80f0f 100%);
    border-color: transparent;
    color: #fff;
    box-shadow: 0 6px 20px var(--red-glow);
  }
  .stat .label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    opacity: 0.7;
  }
  .stat .value {
    font-size: 30px;
    font-weight: 700;
    line-height: 1.1;
    margin-top: 6px;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }
  .stat .unit {
    font-size: 16px;
    font-weight: 600;
    opacity: 0.8;
    margin-left: 2px;
  }

  /* ---------- BANNER (active session) ---------- */
  .active-banner {
    background: var(--green-bg);
    border-bottom: 1px solid rgba(74, 222, 128, 0.25);
    color: var(--green);
    padding: 10px 16px;
    text-align: center;
    font-size: 12px;
    font-weight: 500;
  }
  .active-banner::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
    box-shadow: 0 0 8px var(--green);
    animation: livePulse 2s infinite;
  }
  @keyframes livePulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .active-banner strong {
    font-weight: 600;
    color: var(--text);
    margin-left: 4px;
  }

  /* ---------- TOAST ---------- */
  .toast {
    position: fixed;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-3);
    color: var(--text);
    padding: 11px 18px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    z-index: 300;
    border: 1px solid var(--border-strong);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: toastIn 0.25s cubic-bezier(0.32, 0.72, 0, 1);
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 12px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  /* ---------- DIVIDER ---------- */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  .header-action-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .header-action-row .btn { flex: 1; min-width: 130px; }

  .session-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 8px;
    display: block;
    cursor: pointer;
    border-radius: 14px;
    transition: border-color 0.15s, transform 0.1s, background 0.15s;
  }
  .session-card:active { transform: scale(0.99); background: var(--bg-2); }
  .session-card.is-active { border-color: var(--red); background: var(--red-bg); }
  .session-card .session-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .session-card .session-stats {
    display: flex;
    gap: 14px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-3);
    flex-wrap: wrap;
  }
  .session-card .session-stats span strong {
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
  }
  .session-card .session-stats span:nth-child(3) strong { color: var(--yellow); }
  .session-active-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .session-active-tag::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--red);
    animation: livePulse 2s infinite;
  }

  /* Override anti-darkmode iOS — the design IS dark intentionally */
  @media (prefers-color-scheme: light) {
    html, body {
      background-color: var(--bg) !important;
      color: var(--text) !important;
    }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo-mark"></div>
    <div class="brand-text">
      <h1>PokéBrocante</h1>
      <div class="tagline">Gestion de brocante</div>
    </div>
  </div>
</header>

<div id="active-session-banner" style="display:none;" class="active-banner">
  Session active : <strong id="active-session-name"></strong>
</div>

<!-- ============ VUE CATALOGUE ============ -->
<section id="view-catalog" class="view active">
  <div class="section-title">Catalogue</div>
  <div class="header-action-row">
    <button class="btn btn-cardinal" onclick="openCardModal()">+ Nouvelle carte</button>
    <button class="btn btn-ghost" onclick="generateBarcodesPDF()">📄 Imprimer les QR codes</button>
  </div>
  <div id="catalog-list"></div>
</section>

<!-- ============ VUE BROCANTES ============ -->
<section id="view-sessions" class="view">
  <div class="section-title">Brocantes</div>
  <button class="btn btn-cardinal btn-block" style="margin-bottom: 16px;" onclick="openSessionModal()">+ Nouvelle brocante</button>
  <div id="sessions-list"></div>
</section>

<!-- ============ VUE SCAN ============ -->
<section id="view-scan" class="view">
  <div class="section-title">Scanner une carte</div>
  <div id="no-active-session" style="display:none;" class="empty">
    <div class="big">⚠</div>
    <div class="msg">Aucune brocante active.<br/>Crée ou active une brocante pour scanner.</div>
    <button class="btn btn-ghost" style="margin-top: 18px;" onclick="showView('sessions')">Voir mes brocantes</button>
  </div>
  <div id="scan-area">
    <div id="scan-region"></div>
    <div class="scan-status" id="scan-status">Initialisation…</div>
    <div id="scan-feedback"></div>
    <div class="divider"></div>
    <button class="btn btn-ghost btn-block" onclick="manualScanInput()">Saisir le code à la main</button>
  </div>
</section>

<!-- ============ VUE STATS / DETAIL SESSION ============ -->
<section id="view-stats" class="view">
  <div id="stats-content"></div>
</section>

<!-- ============ NAV BOTTOM ============ -->
<nav class="bottom">
  <button onclick="showView('catalog')" data-view="catalog" class="active">
    <span class="ico">⊞</span><span>Catalogue</span>
  </button>
  <button onclick="showView('sessions')" data-view="sessions">
    <span class="ico">✦</span><span>Brocantes</span>
  </button>
  <button onclick="showView('scan')" data-view="scan">
    <span class="ico">◉</span><span>Scanner</span>
  </button>
  <button onclick="showView('stats')" data-view="stats">
    <span class="ico">≡</span><span>Bilan</span>
  </button>
</nav>

<!-- ============ MODAL : CARTE ============ -->
<div class="modal-bg" id="modal-card">
  <div class="modal">
    <h2 id="modal-card-title">Nouvelle carte</h2>
    <div class="modal-sub">Ajout au catalogue</div>
    <div class="field">
      <label>Nom de la carte</label>
      <input type="text" id="card-name" placeholder="Dracaufeu Holo" />
    </div>
    <div class="field">
      <label>Prix (€)</label>
      <input type="number" id="card-price" step="0.50" min="0" placeholder="15.00" />
    </div>
    <div class="field">
      <label>Note (optionnel)</label>
      <input type="text" id="card-note" placeholder="Édition Base, état Near Mint…" />
    </div>
    <div style="display:flex; gap:10px; margin-top:18px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeModal('modal-card')">Annuler</button>
      <button class="btn btn-cardinal" style="flex:1;" onclick="saveCard()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- ============ MODAL : SESSION ============ -->
<div class="modal-bg" id="modal-session">
  <div class="modal">
    <h2>Nouvelle brocante</h2>
    <div class="modal-sub">Création de session</div>
    <div class="field">
      <label>Nom de la brocante</label>
      <input type="text" id="session-name" placeholder="Brocante de Vincennes" />
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="session-date" />
    </div>
    <div style="display:flex; gap:10px; margin-top:18px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeModal('modal-session')">Annuler</button>
      <button class="btn btn-cardinal" style="flex:1;" onclick="saveSession()">Créer & activer</button>
    </div>
  </div>
</div>

<script>
/* =================================================================
   STORAGE — IndexedDB
   ================================================================= */
const DB_NAME = 'pokebrocante';
const DB_VERSION = 1;
let db;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('cards')) {
        d.createObjectStore('cards', { keyPath: 'id' });
      }
      if (!d.objectStoreNames.contains('sessions')) {
        d.createObjectStore('sessions', { keyPath: 'id' });
      }
      if (!d.objectStoreNames.contains('settings')) {
        d.createObjectStore('settings', { keyPath: 'key' });
      }
    };
    req.onsuccess = () => { db = req.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function tx(store, mode = 'readonly') {
  return db.transaction(store, mode).objectStore(store);
}
function dbAll(store) {
  return new Promise((res, rej) => {
    const r = tx(store).getAll();
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
function dbGet(store, key) {
  return new Promise((res, rej) => {
    const r = tx(store).get(key);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
function dbPut(store, value) {
  return new Promise((res, rej) => {
    const r = tx(store, 'readwrite').put(value);
    r.onsuccess = () => res();
    r.onerror = () => rej(r.error);
  });
}
function dbDelete(store, key) {
  return new Promise((res, rej) => {
    const r = tx(store, 'readwrite').delete(key);
    r.onsuccess = () => res();
    r.onerror = () => rej(r.error);
  });
}

/* =================================================================
   STATE
   ================================================================= */
let cards = [];
let sessions = [];
let activeSessionId = null;
let editingCardId = null;
let scanner = null;

/* =================================================================
   UTILS
   ================================================================= */
function uid() {
  // Code-barres compatible CODE128 — court, lisible, unique
  const ts = Date.now().toString(36).toUpperCase();
  const r = Math.random().toString(36).slice(2, 6).toUpperCase();
  return `PK${ts}${r}`;
}

function fmtPrice(p) {
  return Number(p).toFixed(2).replace('.', ',') + ' €';
}

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function fmtDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

/* =================================================================
   NAVIGATION
   ================================================================= */
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('nav.bottom button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === name);
  });

  if (name === 'scan') startScanner();
  else stopScanner();

  if (name === 'sessions') renderSessions();
  if (name === 'catalog') renderCatalog();
  if (name === 'stats') renderStats();
}

/* =================================================================
   CATALOGUE
   ================================================================= */
function renderCatalog() {
  const list = document.getElementById('catalog-list');
  if (cards.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="big">✦</div>
        <div class="msg">Ton catalogue est vide.<br/>Ajoute ta première carte.</div>
      </div>`;
    return;
  }
  // tri alpha
  const sorted = [...cards].sort((a, b) => a.name.localeCompare(b.name));
  list.innerHTML = sorted.map(c => `
    <div class="card-item">
      <div class="card-info">
        <div class="card-name">${escapeHtml(c.name)}</div>
        <div class="card-meta">${c.id}${c.note ? ' · ' + escapeHtml(c.note) : ''}</div>
      </div>
      <div class="card-price">${fmtPrice(c.price)}</div>
      <div class="card-actions">
        <button class="icon-btn" onclick="editCard('${c.id}')" title="Modifier">✎</button>
        <button class="icon-btn" onclick="deleteCard('${c.id}')" title="Supprimer">✕</button>
      </div>
    </div>
  `).join('');
}

function openCardModal() {
  editingCardId = null;
  document.getElementById('modal-card-title').textContent = 'Nouvelle carte';
  document.getElementById('card-name').value = '';
  document.getElementById('card-price').value = '';
  document.getElementById('card-note').value = '';
  document.getElementById('modal-card').classList.add('open');
}

function editCard(id) {
  const c = cards.find(x => x.id === id);
  if (!c) return;
  editingCardId = id;
  document.getElementById('modal-card-title').textContent = 'Modifier la carte';
  document.getElementById('card-name').value = c.name;
  document.getElementById('card-price').value = c.price;
  document.getElementById('card-note').value = c.note || '';
  document.getElementById('modal-card').classList.add('open');
}

async function saveCard() {
  const name = document.getElementById('card-name').value.trim();
  const price = parseFloat(document.getElementById('card-price').value);
  const note = document.getElementById('card-note').value.trim();

  if (!name) return toast('Nom requis');
  if (isNaN(price) || price < 0) return toast('Prix invalide');

  if (editingCardId) {
    const c = cards.find(x => x.id === editingCardId);
    c.name = name; c.price = price; c.note = note;
    await dbPut('cards', c);
    toast('Carte modifiée');
  } else {
    const c = { id: uid(), name, price, note, createdAt: Date.now() };
    cards.push(c);
    await dbPut('cards', c);
    toast('Carte ajoutée');
  }
  closeModal('modal-card');
  renderCatalog();
}

async function deleteCard(id) {
  if (!confirm('Supprimer cette carte du catalogue ?')) return;
  cards = cards.filter(c => c.id !== id);
  await dbDelete('cards', id);
  renderCatalog();
  toast('Carte supprimée');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* =================================================================
   SESSIONS
   ================================================================= */
function renderSessions() {
  const list = document.getElementById('sessions-list');
  if (sessions.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="big">✦</div>
        <div class="msg">Aucune brocante enregistrée.</div>
      </div>`;
    return;
  }
  const sorted = [...sessions].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  list.innerHTML = sorted.map(s => {
    const sales = s.sales || [];
    const total = sales.reduce((sum, x) => sum + x.price, 0);
    const isActive = s.id === activeSessionId;
    return `
      <div class="session-card ${isActive ? 'is-active' : ''}" onclick="openSessionDetail('${s.id}')">
        <div class="session-title">${escapeHtml(s.name)}</div>
        <div class="session-stats">
          <span>📅 ${fmtDate(s.date)}</span>
          <span>🃏 <strong>${sales.length}</strong> vendues</span>
          <span>💰 <strong>${fmtPrice(total)}</strong></span>
        </div>
        ${isActive ? '<div class="session-active-tag">Active</div>' : ''}
      </div>
    `;
  }).join('');
}

function openSessionModal() {
  document.getElementById('session-name').value = '';
  document.getElementById('session-date').value = todayISO();
  document.getElementById('modal-session').classList.add('open');
}

async function saveSession() {
  const name = document.getElementById('session-name').value.trim();
  const date = document.getElementById('session-date').value;
  if (!name) return toast('Nom requis');

  const s = { id: uid(), name, date, sales: [], createdAt: Date.now() };
  sessions.push(s);
  await dbPut('sessions', s);
  await setActiveSession(s.id);
  closeModal('modal-session');
  toast('Brocante créée et activée');
  renderSessions();
}

async function setActiveSession(id) {
  activeSessionId = id;
  await dbPut('settings', { key: 'activeSession', value: id });
  updateActiveBanner();
}

function updateActiveBanner() {
  const banner = document.getElementById('active-session-banner');
  if (activeSessionId) {
    const s = sessions.find(x => x.id === activeSessionId);
    if (s) {
      banner.style.display = 'block';
      document.getElementById('active-session-name').textContent = s.name;
      return;
    }
  }
  banner.style.display = 'none';
}

function openSessionDetail(id) {
  showView('stats');
  renderStats(id);
}

/* =================================================================
   STATS / DÉTAIL SESSION
   ================================================================= */
function renderStats(forceId) {
  const id = forceId || activeSessionId;
  const root = document.getElementById('stats-content');
  if (!id) {
    root.innerHTML = `
      <div class="section-title">Bilan</div>
      <div class="empty">
        <div class="big">≡</div>
        <div class="msg">Sélectionne une brocante pour voir le bilan.</div>
        <button class="btn btn-ghost" style="margin-top:18px;" onclick="showView('sessions')">Mes brocantes</button>
      </div>`;
    return;
  }
  const s = sessions.find(x => x.id === id);
  if (!s) return;
  const sales = s.sales || [];
  const total = sales.reduce((sum, x) => sum + x.price, 0);
  const isActive = s.id === activeSessionId;

  root.innerHTML = `
    <div class="section-title">Bilan · ${escapeHtml(s.name)}</div>
    <div style="font-size: 13px; color: var(--text-3); margin: -8px 0 18px;">
      ${fmtDate(s.date)}
    </div>

    <div class="summary-grid">
      <div class="stat">
        <div class="label">Cartes vendues</div>
        <div class="value">${sales.length}</div>
      </div>
      <div class="stat cardinal">
        <div class="label">Total encaissé</div>
        <div class="value">${total.toFixed(2).replace('.', ',')}<span class="unit"> €</span></div>
      </div>
    </div>

    <div class="header-action-row">
      ${isActive
        ? `<button class="btn btn-ghost" onclick="deactivateSession()">Désactiver</button>`
        : `<button class="btn btn-cardinal" onclick="activateSession('${s.id}')">Activer cette brocante</button>`}
      <button class="btn btn-ghost" onclick="exportSession('${s.id}')">📋 Exporter</button>
      <button class="btn btn-ghost" onclick="deleteSession('${s.id}')">✕ Supprimer</button>
    </div>

    <div class="divider"></div>

    <div class="section-title">Cartes vendues</div>
    ${sales.length === 0 ? `
      <div class="empty"><div class="msg">Aucune vente pour l'instant.</div></div>
    ` : sales.slice().reverse().map((sale, i) => `
      <div class="card-item">
        <div class="card-info">
          <div class="card-name">${escapeHtml(sale.name)}</div>
          <div class="card-meta">${new Date(sale.at).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})} · ${sale.cardId}</div>
        </div>
        <div class="card-price">${fmtPrice(sale.price)}</div>
        <button class="icon-btn" onclick="undoSale('${s.id}', ${sales.length - 1 - i})" title="Annuler">↶</button>
      </div>
    `).join('')}
  `;
}

async function activateSession(id) {
  await setActiveSession(id);
  renderStats(id);
  toast('Brocante activée');
}

async function deactivateSession() {
  await setActiveSession(null);
  renderStats(null);
  toast('Brocante désactivée');
}

async function deleteSession(id) {
  if (!confirm('Supprimer cette brocante et son historique ?')) return;
  sessions = sessions.filter(s => s.id !== id);
  await dbDelete('sessions', id);
  if (activeSessionId === id) await setActiveSession(null);
  showView('sessions');
  toast('Brocante supprimée');
}

async function undoSale(sessionId, saleIdx) {
  const s = sessions.find(x => x.id === sessionId);
  if (!s) return;
  if (!confirm('Annuler cette vente ?')) return;
  s.sales.splice(saleIdx, 1);
  await dbPut('sessions', s);
  renderStats(sessionId);
  toast('Vente annulée');
}

function exportSession(id) {
  const s = sessions.find(x => x.id === id);
  if (!s) return;
  const sales = s.sales || [];
  const total = sales.reduce((sum, x) => sum + x.price, 0);
  let txt = `BROCANTE — ${s.name}\nDate : ${fmtDate(s.date)}\n\n`;
  txt += `${sales.length} carte(s) vendue(s) — Total : ${fmtPrice(total)}\n\n`;
  sales.forEach(sale => {
    txt += `· ${sale.name.padEnd(40)} ${fmtPrice(sale.price).padStart(10)}\n`;
  });
  const blob = new Blob([txt], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `brocante-${s.name.replace(/\s+/g, '-')}-${s.date}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

/* =================================================================
   SCAN
   ================================================================= */
async function startScanner() {
  const noSession = document.getElementById('no-active-session');
  const scanArea = document.getElementById('scan-area');
  if (!activeSessionId) {
    noSession.style.display = 'block';
    scanArea.style.display = 'none';
    return;
  }
  noSession.style.display = 'none';
  scanArea.style.display = 'block';

  if (scanner) return; // déjà actif

  document.getElementById('scan-status').textContent = 'Démarrage de la caméra…';
  try {
    scanner = new Html5Qrcode('scan-region', { verbose: false });
    await scanner.start(
      { facingMode: 'environment' },
      {
        fps: 15,
        qrbox: (vw, vh) => {
          const m = Math.min(vw, vh);
          const s = Math.floor(m * 0.72);
          return { width: s, height: s };
        },
        aspectRatio: 1.0,
        formatsToSupport: [Html5QrcodeSupportedFormats.QR_CODE],
        experimentalFeatures: { useBarCodeDetectorIfSupported: true },
      },
      (decoded) => handleScan(decoded),
      () => {}
    );
    document.getElementById('scan-status').textContent = '◉ Visez le QR code';
  } catch (e) {
    document.getElementById('scan-status').textContent = '✕ Caméra inaccessible';
    console.error(e);
  }
}

async function stopScanner() {
  if (scanner) {
    try { await scanner.stop(); await scanner.clear(); } catch(e) {}
    scanner = null;
  }
}

let lastScanTime = 0;
let lastScanCode = '';
async function handleScan(code) {
  // anti-rebond : même code pendant 2 secondes ignoré
  const now = Date.now();
  if (code === lastScanCode && now - lastScanTime < 2000) return;
  lastScanCode = code;
  lastScanTime = now;

  await processScannedCode(code);
}

async function processScannedCode(rawCode) {
  const fb = document.getElementById('scan-feedback');
  // Normalisation : trim + uppercase pour éviter les soucis de casse
  const code = String(rawCode).trim().toUpperCase();

  // Recherche stricte
  let card = cards.find(c => c.id === code);

  // Recherche tolérante : si c'est un QR scanné mais peut-être avec espace/préfixe
  if (!card) {
    card = cards.find(c => c.id.toUpperCase() === code);
  }

  if (!card) {
    fb.className = 'scan-feedback err';
    fb.innerHTML = `
      <strong>Code inconnu</strong>
      <span>Lu : <code style="font-family:ui-monospace,Menlo,monospace; background:rgba(255,255,255,0.08); padding:2px 6px; border-radius:4px;">${escapeHtml(code)}</code></span>
      <span style="display:block; margin-top:6px; font-size:12px; opacity:0.7;">Ce code n'est dans aucune carte du catalogue.</span>
    `;
    if (navigator.vibrate) navigator.vibrate([80, 50, 80]);
    return;
  }

  const session = sessions.find(s => s.id === activeSessionId);
  if (!session) return;

  // déjà vendue ?
  if ((session.sales || []).some(x => x.cardId === card.id)) {
    fb.className = 'scan-feedback err';
    fb.innerHTML = `<strong>Déjà vendue !</strong><span>${escapeHtml(card.name)} · ${fmtPrice(card.price)}</span>`;
    if (navigator.vibrate) navigator.vibrate([80, 50, 80]);
    return;
  }

  session.sales = session.sales || [];
  session.sales.push({
    cardId: card.id,
    name: card.name,
    price: card.price,
    at: Date.now(),
  });
  await dbPut('sessions', session);

  fb.className = 'scan-feedback ok';
  const totalNow = session.sales.reduce((s, x) => s + x.price, 0);
  fb.innerHTML = `<strong>${escapeHtml(card.name)}</strong>
    <span>+${fmtPrice(card.price)} · Total ${fmtPrice(totalNow)}</span>`;
  if (navigator.vibrate) navigator.vibrate(60);
}

function manualScanInput() {
  const code = prompt('Saisis le code (ex : PK...) :');
  if (code) processScannedCode(code.trim().toUpperCase());
}

/* =================================================================
   PDF DES QR CODES — Format Avery L7160 (21 / page)
   63.5 × 38.1 mm — 3 colonnes × 7 lignes
   QR à gauche, texte à droite
   ================================================================= */
async function generateBarcodesPDF() {
  if (cards.length === 0) {
    toast('Catalogue vide');
    return;
  }

  // Vérifier que la lib QR est chargée — qrcode-generator expose window.qrcode (fonction)
  if (typeof window.qrcode !== 'function') {
    toast('Lib QR non chargée — vérifie la connexion');
    console.error('qrcode lib introuvable. typeof window.qrcode=', typeof window.qrcode);
    return;
  }
  if (!window.jspdf || !window.jspdf.jsPDF) {
    toast('Lib PDF non chargée — vérifie la connexion');
    console.error('jsPDF introuvable. window.jspdf=', window.jspdf);
    return;
  }

  // Helper : génère un dataURL PNG d'un QR à partir d'un texte
  // Utilise typeNumber=0 (auto-détection de version) et niveau de correction H
  function qrToDataURL(text) {
    const qr = window.qrcode(0, 'H');
    qr.addData(text);
    qr.make();
    // cellSize = 8px par module, margin = 2 modules
    return qr.createDataURL(8, 2);
  }

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });

    // Avery L7160
    const pageW = 210, pageH = 297;
    const cols = 3, rows = 7;
    const labelW = 63.5, labelH = 38.1;
    const marginX = (pageW - cols * labelW) / 2;
    const marginY = (pageH - rows * labelH) / 2;

    cards.forEach((card, i) => {
      const idx = i % (cols * rows);
      if (i > 0 && idx === 0) doc.addPage();
      const col = idx % cols;
      const row = Math.floor(idx / cols);
      const x = marginX + col * labelW;
      const y = marginY + row * labelH;

      // Cadre léger (utile pour découpe / alignement)
      doc.setDrawColor(220);
      doc.setLineWidth(0.1);
      doc.rect(x, y, labelW, labelH);

      // QR code à gauche — 30×30mm
      const qrSize = 30;
      const qrX = x + 3;
      const qrY = y + (labelH - qrSize) / 2;
      const qrDataUrl = qrToDataURL(card.id);
      doc.addImage(qrDataUrl, 'PNG', qrX, qrY, qrSize, qrSize);

      // Zone texte à droite
      const textX = x + qrSize + 6;
      const textW = labelW - qrSize - 8;

      // Nom de la carte (multi-ligne, max 2 lignes)
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(20);
      const nameLines = doc.splitTextToSize(card.name, textW);
      const displayLines = nameLines.slice(0, 2);
      if (nameLines.length > 2) displayLines[1] = displayLines[1].slice(0, -1) + '…';
      displayLines.forEach((line, idx) => {
        doc.text(line, textX, y + 8 + idx * 4);
      });

      // Prix bien visible
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(15);
      doc.setTextColor(238, 21, 21);
      doc.text(fmtPrice(card.price), textX, y + labelH - 9);

      // ID en petit en bas
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(6);
      doc.setTextColor(120);
      doc.text(card.id, textX, y + labelH - 4);
    });

    doc.save(`pokebrocante-codes-${todayISO()}.pdf`);
    toast(`${cards.length} étiquette(s) générée(s)`);
  } catch (err) {
    console.error('PDF generation error:', err);
    toast('Erreur PDF : ' + (err.message || err));
  }
}

/* =================================================================
   MODAL UTILS
   ================================================================= */
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', (e) => {
    if (e.target === bg) bg.classList.remove('open');
  });
});

/* =================================================================
   INIT
   ================================================================= */
async function init() {
  await openDB();
  cards = await dbAll('cards');
  sessions = await dbAll('sessions');
  const setting = await dbGet('settings', 'activeSession');
  activeSessionId = setting ? setting.value : null;
  updateActiveBanner();
  renderCatalog();

  // PWA service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}
init();
